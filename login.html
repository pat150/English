<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cambridge Exam Practice · Sign In</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@300;400;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);font-family:'Source Serif 4',serif;color:#e8e0d5;}
  header{background:rgba(0,0,0,0.4);border-bottom:2px solid #c9a84c;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(12px);}
  .logo{font-family:'Playfair Display',serif;color:#c9a84c;letter-spacing:3px;font-size:1rem;text-transform:uppercase;}
  /* ── Login card ── */
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:40px 20px;}
  .login-card{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:44px 40px;max-width:420px;width:100%;backdrop-filter:blur(8px);}
  h1{font-family:'Playfair Display',serif;color:#c9a84c;font-size:1.8rem;text-align:center;margin-bottom:6px;}
  .tagline{color:#888;font-size:0.85rem;text-align:center;margin-bottom:32px;letter-spacing:1px;}
  label{display:block;color:#aaa;font-size:0.78rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  input[type="text"]{width:100%;padding:12px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(201,168,76,0.4);border-radius:4px;color:#e8e0d5;font-size:1rem;font-family:inherit;margin-bottom:20px;outline:none;transition:border-color 0.2s;}
  input[type="text"]:focus{border-color:#c9a84c;background:rgba(255,255,255,0.12);}
  input::placeholder{color:#555;}
  .btn{width:100%;background:#c9a84c;color:#0f2027;border:none;padding:14px;font-size:1rem;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:1px;font-family:inherit;margin-top:4px;transition:background 0.2s;}
  .btn:hover{background:#d9bb6a;}
  .error{color:#eb5757;font-size:0.85rem;margin-bottom:14px;display:none;text-align:center;}
  .divider{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:24px 0;}
  .btn-outline{width:100%;background:transparent;border:1px solid #c9a84c;color:#c9a84c;padding:12px;font-size:0.9rem;border-radius:4px;cursor:pointer;font-family:inherit;letter-spacing:1px;margin-bottom:10px;transition:all 0.2s;}
  .btn-outline:hover{background:rgba(201,168,76,0.1);}
  .btn-outline.danger{border-color:#eb5757;color:#eb5757;}
  .btn-outline.danger:hover{background:rgba(235,87,87,0.08);}
  .hint{color:#555;font-size:0.78rem;text-align:center;margin-top:16px;line-height:1.6;}
  /* ── History dashboard ── */
  .dash-wrap{max-width:860px;margin:0 auto;padding:36px 28px 60px;}
  .welcome-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:32px;}
  .welcome-name{font-family:'Playfair Display',serif;font-size:2rem;color:#c9a84c;}
  .welcome-class{color:#888;font-size:0.88rem;margin-top:4px;}
  .welcome-actions{display:flex;gap:10px;flex-wrap:wrap;}
  .btn-sm{background:transparent;border:1px solid rgba(201,168,76,0.5);color:#c9a84c;padding:8px 18px;cursor:pointer;border-radius:3px;font-size:0.8rem;letter-spacing:1px;font-family:inherit;text-decoration:none;display:inline-block;}
  .btn-sm:hover{background:rgba(201,168,76,0.1);}
  .btn-sm.danger{border-color:rgba(235,87,87,0.5);color:#eb5757;}
  .btn-sm.danger:hover{background:rgba(235,87,87,0.08);}
  /* Stats strip */
  .stats-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:32px;}
  .stat-box{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);border-radius:8px;padding:16px;text-align:center;}
  .stat-num{font-family:'Playfair Display',serif;font-size:1.9rem;color:#c9a84c;}
  .stat-lbl{color:#666;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
  /* History table */
  .section-hdr{color:#c9a84c;font-size:0.78rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.2);}
  .history-empty{color:#555;font-style:italic;padding:30px;text-align:center;background:rgba(255,255,255,0.02);border-radius:8px;border:1px dashed rgba(255,255,255,0.07);}
  .hist-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:13px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;margin-bottom:8px;transition:border-color 0.2s;}
  .hist-row:hover{border-color:rgba(201,168,76,0.25);}
  .hist-label{font-size:0.9rem;color:#ddd;}
  .hist-label .level-tag{font-size:0.68rem;letter-spacing:1px;padding:2px 7px;border-radius:3px;margin-right:8px;font-weight:bold;}
  .tag-c2{background:rgba(192,57,43,0.2);border:1px solid rgba(192,57,43,0.4);color:#e74c3c;}
  .tag-c1{background:rgba(211,84,0,0.2);border:1px solid rgba(211,84,0,0.4);color:#d35400;}
  .tag-b2{background:rgba(26,122,74,0.2);border:1px solid rgba(26,122,74,0.4);color:#2ecc71;}
  .tag-b1{background:rgba(26,95,168,0.2);border:1px solid rgba(26,95,168,0.4);color:#3498db;}
  .hist-meta{color:#666;font-size:0.75rem;margin-top:3px;}
  .hist-score{text-align:right;}
  .score-pill{display:inline-block;padding:3px 12px;border-radius:12px;font-weight:bold;font-size:0.82rem;}
  .score-hi{background:rgba(111,207,151,0.15);border:1px solid rgba(111,207,151,0.3);color:#6fcf97;}
  .score-mid{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);color:#c9a84c;}
  .score-lo{background:rgba(235,87,87,0.15);border:1px solid rgba(235,87,87,0.3);color:#eb5757;}
  .score-pending{color:#555;font-style:italic;font-size:0.8rem;}
  /* Sparkline */
  .sparkline-wrap{display:flex;align-items:flex-end;gap:3px;height:28px;margin-top:6px;}
  .spark-bar{width:8px;border-radius:2px 2px 0 0;background:#c9a84c;opacity:0.7;min-height:3px;}
  /* Review link */
  .hist-review{color:#888;font-size:0.75rem;text-decoration:none;letter-spacing:1px;white-space:nowrap;}
  .hist-review:hover{color:#c9a84c;text-decoration:underline;}
  @media(max-width:600px){.dash-wrap{padding:24px 16px 40px;}.hist-row{grid-template-columns:1fr auto;}.hist-score{display:none;}}
</style>
</head>
<body>
<header>
  <span class="logo">Cambridge Exam Practice</span>
  <a href="index.html" style="color:#c9a84c;font-size:0.82rem;letter-spacing:1px;text-decoration:none;">← Activities</a>
</header>

<!-- LOGIN FORM -->
<div id="view-login" class="login-wrap">
  <div class="login-card">
    <h1>Sign In</h1>
    <p class="tagline">Enter your name and class code to continue</p>
    <div class="error" id="err">Please fill in both fields.</div>
    <label for="inp-name">Your Name</label>
    <input type="text" id="inp-name" placeholder="e.g. Maria García" autocomplete="given-name" onkeydown="if(event.key==='Enter')document.getElementById('inp-class').focus()"/>
    <label for="inp-class">Class Code</label>
    <input type="text" id="inp-class" placeholder="e.g. CAE2024" autocomplete="off" style="text-transform:uppercase;" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn" onclick="doLogin()">Sign In →</button>
    <p class="hint">Your teacher will give you the class code.<br>Your progress is saved on this device.</p>
  </div>
</div>

<!-- HISTORY DASHBOARD -->
<div id="view-history" style="display:none;">
  <div class="dash-wrap">
    <div class="welcome-row">
      <div>
        <div class="welcome-name" id="hi-name"></div>
        <div class="welcome-class" id="hi-class"></div>
      </div>
      <div class="welcome-actions">
        <a href="index.html" class="btn-sm">← Activities</a>
        <button class="btn-sm danger" onclick="doLogout()">Sign Out</button>
      </div>
    </div>

    <div class="stats-strip" id="stats-strip"></div>

    <div class="section-hdr">My Results History</div>
    <div id="history-list"></div>
  </div>
</div>

<script>
// ── Registry: all known activities ────────────────────────────────────────────
const CAM_REGISTRY = [
  {key:'cpe_submissions',    label:'CPE · Part 5 · Multiple Choice',           level:'C2', file:'cpe_part5_quiz.html'},
  {key:'cpe_p6_submissions', label:'CPE · Part 6 · Gapped Text',               level:'C2', file:'cpe_part6_quiz.html'},
  {key:'cpe_p7_submissions', label:'CPE · Part 7 · Multiple Matching',         level:'C2', file:'cpe_part7_quiz.html'},
  {key:'cae_p1_subs',        label:'CAE Full 1 · Part 1 · MC Cloze',           level:'C1', file:'cae_full_1_part1.html'},
  {key:'cae_p2_subs',        label:'CAE Full 1 · Part 2 · Open Cloze',         level:'C1', file:'cae_full_1_part2.html'},
  {key:'cae_p3_subs',        label:'CAE Full 1 · Part 3 · Word Formation',     level:'C1', file:'cae_full_1_part3.html'},
  {key:'cae_p4_subs',        label:'CAE Full 1 · Part 4 · KWT',                level:'C1', file:'cae_full_1_part4.html'},
  {key:'cae2_p1_subs',       label:'CAE Full 2 · Part 1 · MC Cloze',           level:'C1', file:'cae_full_2_part1.html'},
  {key:'cae2_p2_subs',       label:'CAE Full 2 · Part 2 · Open Cloze',         level:'C1', file:'cae_full_2_part2.html'},
  {key:'cae2_p3_subs',       label:'CAE Full 2 · Part 3 · Word Formation',     level:'C1', file:'cae_full_2_part3.html'},
  {key:'pt14_subs',          label:'CAE Practice Test 14 · KWT',               level:'C1', file:'practice_test_14.html'},
  {key:'pt15_subs',          label:'CAE Practice Test 15 · Truth About Love',  level:'C1', file:'practice_test_15.html'},
  {key:'pt16_subs',          label:'CAE Practice Test 16 · Breakthroughs',     level:'C1', file:'practice_test_16.html'},
  {key:'pkw1_subs',          label:'CAE Keyword Practice 1',                   level:'C1', file:'practice_keyword_1.html'},
  {key:'cae_kwt1_subs',      label:'CAE KWT · Q1–10',    level:'C1', file:'practice_kwt_1.html'},
  {key:'cae_kwt2_subs',      label:'CAE KWT · Q11–20',   level:'C1', file:'practice_kwt_2.html'},
  {key:'cae_kwt3_subs',      label:'CAE KWT · Q21–30',   level:'C1', file:'practice_kwt_3.html'},
  {key:'cae_kwt4_subs',      label:'CAE KWT · Q31–40',   level:'C1', file:'practice_kwt_4.html'},
  {key:'cae_kwt5_subs',      label:'CAE KWT · Q41–50',   level:'C1', file:'practice_kwt_5.html'},
  {key:'cae_kwt6_subs',      label:'CAE KWT · Q51–60',   level:'C1', file:'practice_kwt_6.html'},
  {key:'cae_kwt7_subs',      label:'CAE KWT · Q61–70',   level:'C1', file:'practice_kwt_7.html'},
  {key:'b2_p1_nyc_subs',     label:'B2 · New York City',                       level:'B2', file:'fce_practice_test_1.html'},
  {key:'b2_p1_britain_subs', label:'B2 · First People of Britain',             level:'B2', file:'fce_practice_test_2.html'},
  {key:'b2_p1_wenglish_subs',label:'B2 · World English',                       level:'B2', file:'fce_practice_test_3.html'},
  {key:'b2_p1_balloon_subs', label:'B2 · Balloon Adventure',                   level:'B2', file:'fce_practice_test_4.html'},
  {key:'b2_p1_musician_subs',label:'B2 · A Musician is Discovered',            level:'B2', file:'fce_practice_test_5.html'},
];

const USER_KEY='cam_user';
function getUser(){try{return JSON.parse(localStorage.getItem(USER_KEY)||'null');}catch{return null;}}
function setUser(u){localStorage.setItem(USER_KEY,JSON.stringify(u));}
function removeUser(){localStorage.removeItem(USER_KEY);}

function doLogin(){
  const name=document.getElementById('inp-name').value.trim();
  const cls=document.getElementById('inp-class').value.trim().toUpperCase();
  if(!name||!cls){document.getElementById('err').style.display='block';return;}
  document.getElementById('err').style.display='none';
  setUser({name,cls,loginAt:new Date().toISOString()});
  showHistory(getUser());
}
function doLogout(){removeUser();document.getElementById('view-history').style.display='none';document.getElementById('view-login').style.display='flex';document.getElementById('view-login').style.flexDirection='';}

function showHistory(u){
  document.getElementById('view-login').style.display='none';
  document.getElementById('view-history').style.display='block';
  document.getElementById('hi-name').textContent=u.name;
  document.getElementById('hi-class').textContent='Class: '+u.cls+' · Signed in '+new Date(u.loginAt).toLocaleDateString();
  buildHistory(u);
}

function buildHistory(u){
  // Gather all submissions by this student (match by name, case-insensitive)
  const myName=u.name.toLowerCase().trim();
  let allEntries=[];
  CAM_REGISTRY.forEach(act=>{
    let subs=[];
    try{subs=JSON.parse(localStorage.getItem(act.key)||'[]');}catch{}
    const mine=subs.filter(s=>(s.name||'').toLowerCase().trim()===myName);
    if(mine.length) allEntries.push({act, subs:mine.sort((a,b)=>a.id-b.id)});
  });

  // Stats
  const totalAttempts=allEntries.reduce((s,e)=>s+e.subs.length,0);
  const scored=allEntries.flatMap(e=>e.subs).filter(s=>typeof s.score==='number'&&s.total);
  const avgPct=scored.length?Math.round(scored.reduce((s,sub)=>s+(sub.score/sub.total*100),0)/scored.length):null;
  const best=scored.length?Math.max(...scored.map(s=>Math.round(s.score/s.total*100))):null;
  document.getElementById('stats-strip').innerHTML=`
    <div class="stat-box"><div class="stat-num">${allEntries.length}</div><div class="stat-lbl">Activities</div></div>
    <div class="stat-box"><div class="stat-num">${totalAttempts}</div><div class="stat-lbl">Attempts</div></div>
    <div class="stat-box"><div class="stat-num">${avgPct!==null?avgPct+'%':'—'}</div><div class="stat-lbl">Avg Score</div></div>
    <div class="stat-box"><div class="stat-num">${best!==null?best+'%':'—'}</div><div class="stat-lbl">Best Score</div></div>
  `;

  // History list
  const list=document.getElementById('history-list');
  if(!allEntries.length){
    list.innerHTML='<div class="history-empty">No activity yet — go to Activities and complete a quiz to see your results here.</div>';
    return;
  }
  // Sort by most recent attempt
  allEntries.sort((a,b)=>b.subs[b.subs.length-1].id - a.subs[a.subs.length-1].id);

  let html='';
  allEntries.forEach(({act,subs})=>{
    const latest=subs[subs.length-1];
    const tagCls='tag-'+act.level.toLowerCase().replace('.','');
    const scoreHtml=scorePill(latest);
    // Sparkline if multiple attempts
    let sparkHtml='';
    if(subs.length>1){
      const pcts=subs.map(s=>typeof s.score==='number'&&s.total?Math.round(s.score/s.total*100):null).filter(p=>p!==null);
      if(pcts.length>1){
        const max=Math.max(...pcts,1);
        sparkHtml='<div class="sparkline-wrap">'+pcts.map(p=>`<div class="spark-bar" style="height:${Math.round(p/max*24)+4}px;opacity:${0.4+0.6*p/100};" title="${p}%"></div>`).join('')+'</div>';
      }
    }
    const attemptsNote=subs.length>1?`${subs.length} attempts · `:'' ;
    html+=`<div class="hist-row">
      <div class="hist-label">
        <span class="level-tag ${tagCls}">${act.level}</span>${esc(act.label)}
        <div class="hist-meta">${attemptsNote}Last: ${latest.submittedAt||'—'}</div>
        ${sparkHtml}
      </div>
      <div style="text-align:right;">
        ${scoreHtml}
        <div style="margin-top:6px;"><a class="hist-review" href="${act.file}">Go to activity →</a></div>
      </div>
    </div>`;
  });
  list.innerHTML=html;
}

function scorePill(sub){
  if(typeof sub.score!=='number'||!sub.total) return '<span class="score-pending">Pending</span>';
  const pct=Math.round(sub.score/sub.total*100);
  const cls=pct>=70?'score-hi':pct>=50?'score-mid':'score-lo';
  return `<span class="score-pill ${cls}">${sub.score}/${sub.total} <span style="opacity:0.7;font-size:0.72rem;">(${pct}%)</span></span>`;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Init
const existing=getUser();
if(existing) showHistory(existing);
</script>
</body>
</html>
